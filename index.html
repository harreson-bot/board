<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harreson Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.2rem; font-weight: 700; color: #7c85f5; }
    header span { color: #64748b; font-size: 0.82rem; }
    .save-status { font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; background: #22263a; color: #64748b; transition: all 0.3s; }
    .save-status.saving { background: #2d3148; color: #f59e0b; }
    .save-status.saved { background: #1e3d2f; color: #34d399; }
    .save-status.error { background: #3d1e2f; color: #f472b6; }

    .board { display: flex; gap: 16px; padding: 20px 24px; overflow-x: auto; align-items: flex-start; min-height: calc(100vh - 57px); }

    .column { background: #1a1d2e; border-radius: 12px; min-width: 270px; max-width: 300px; flex-shrink: 0; border: 1px solid #2d3148; display: flex; flex-direction: column; }
    .col-header { padding: 12px 14px; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 8px; }
    .col-header .count { background: #2d3148; border-radius: 9999px; padding: 1px 8px; font-size: 0.72rem; font-weight: 600; margin-left: auto; }
    .col-request .col-header { color: #a78bfa; }
    .col-todo .col-header { color: #94a3b8; }
    .col-inprog .col-header { color: #60a5fa; }
    .col-pending .col-header { color: #f59e0b; }
    .col-done .col-header { color: #34d399; }

    .cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 60px; transition: background 0.15s; }
    .cards.drag-over { background: #1e2240; border-radius: 8px; }

    .card { background: #22263a; border: 1px solid #2d3148; border-radius: 8px; padding: 10px 12px; cursor: grab; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
    .card:hover { border-color: #4a5080; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .card.dragging { opacity: 0.4; cursor: grabbing; }
    .card-title { font-size: 0.87rem; font-weight: 600; line-height: 1.4; padding-right: 40px; }
    .card-note { font-size: 0.73rem; color: #64748b; margin-top: 5px; line-height: 1.4; }
    .card-meta { font-size: 0.7rem; color: #3d4466; margin-top: 5px; }
    .card-tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
    .card-tag { border-radius: 4px; padding: 1px 6px; font-size: 0.68rem; font-weight: 600; }
    .tag-crm { background: #1e3a5f; color: #60a5fa; }
    .tag-insurance { background: #1e3d2f; color: #34d399; }
    .tag-llc { background: #3d1e2f; color: #f472b6; }
    .tag-infra { background: #2d2a1e; color: #fbbf24; }
    .tag-trading { background: #1e2d3d; color: #818cf8; }
    .tag-request { background: #2d1e3d; color: #a78bfa; }
    .blocked-badge { display: inline-flex; align-items: center; gap: 4px; background: #3d2a1e; color: #f97316; border-radius: 4px; padding: 2px 6px; font-size: 0.68rem; font-weight: 600; margin-top: 5px; }

    .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .card:hover .card-actions { opacity: 1; }
    .btn-icon { background: #2d3148; border: none; color: #94a3b8; border-radius: 4px; width: 22px; height: 22px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .btn-icon:hover { background: #3d4466; color: #e2e8f0; }
    .btn-icon.del:hover { background: #3d1e2f; color: #f472b6; }

    .add-card-btn { margin: 0 10px 10px; padding: 7px; border: 1px dashed #2d3148; border-radius: 7px; background: none; color: #3d4466; font-size: 0.78rem; cursor: pointer; width: calc(100% - 20px); text-align: left; transition: all 0.15s; }
    .add-card-btn:hover { border-color: #4a5080; color: #94a3b8; background: #22263a; }

    .empty { color: #3d4466; font-size: 0.78rem; text-align: center; padding: 14px 0; font-style: italic; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 14px; padding: 24px; width: 420px; max-width: 95vw; }
    .modal h2 { font-size: 1rem; font-weight: 700; color: #e2e8f0; margin-bottom: 16px; }
    .modal label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .modal input, .modal textarea, .modal select { width: 100%; background: #22263a; border: 1px solid #2d3148; border-radius: 7px; color: #e2e8f0; padding: 8px 10px; font-size: 0.85rem; font-family: inherit; outline: none; transition: border-color 0.15s; }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #7c85f5; }
    .modal textarea { resize: vertical; min-height: 70px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .btn { padding: 8px 18px; border-radius: 7px; border: none; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-primary { background: #7c85f5; color: #fff; }
    .btn-primary:hover { background: #6470e8; }
    .btn-secondary { background: #22263a; color: #94a3b8; }
    .btn-secondary:hover { background: #2d3148; }
    .btn-danger { background: #3d1e2f; color: #f472b6; }
    .btn-danger:hover { background: #5d2040; }

    .tag-checkboxes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .tag-cb { display: none; }
    .tag-label { border-radius: 4px; padding: 3px 9px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; opacity: 0.5; transition: opacity 0.15s; }
    .tag-cb:checked + .tag-label { opacity: 1; border-color: currentColor; }
  </style>
</head>
<body>

<header>
  <h1>📋 Harreson Board</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span>Calvenn Starre · Operations</span>
    <span class="save-status" id="saveStatus">● synced</span>
    <button class="btn btn-secondary" style="font-size:0.72rem;padding:3px 10px;" onclick="resetToken()" title="Reset GitHub token">🔑</button>
  </div>
</header>

<div class="board" id="board">
  <div class="column col-request" data-col="request">
    <div class="col-header">📥 Requests <span class="count">0</span></div>
    <div class="cards" id="col-request"></div>
    <button class="add-card-btn" onclick="openModal('request')">＋ Add request</button>
  </div>
  <div class="column col-todo" data-col="todo">
    <div class="col-header">🔲 Todo <span class="count">0</span></div>
    <div class="cards" id="col-todo"></div>
    <button class="add-card-btn" onclick="openModal('todo')">＋ Add card</button>
  </div>
  <div class="column col-inprog" data-col="inprog">
    <div class="col-header">🔄 In Progress <span class="count">0</span></div>
    <div class="cards" id="col-inprog"></div>
    <button class="add-card-btn" onclick="openModal('inprog')">＋ Add card</button>
  </div>
  <div class="column col-pending" data-col="pending">
    <div class="col-header">⏳ Pending <span class="count">0</span></div>
    <div class="cards" id="col-pending"></div>
    <button class="add-card-btn" onclick="openModal('pending')">＋ Add card</button>
  </div>
  <div class="column col-done" data-col="done">
    <div class="col-header">✅ Done <span class="count">0</span></div>
    <div class="cards" id="col-done"></div>
    <button class="add-card-btn" onclick="openModal('done')">＋ Add card</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Card</h2>
    <label>Title *</label>
    <input type="text" id="mTitle" placeholder="What needs to be done?">
    <label>Notes</label>
    <textarea id="mNote" placeholder="Context, links, details..."></textarea>
    <label>Blocked by</label>
    <input type="text" id="mBlocked" placeholder="What's blocking this? (optional)">
    <label>Tags</label>
    <div class="tag-checkboxes">
      <input type="checkbox" class="tag-cb" id="t-insurance" value="insurance"><label for="t-insurance" class="tag-label tag-insurance">insurance</label>
      <input type="checkbox" class="tag-cb" id="t-crm" value="crm"><label for="t-crm" class="tag-label tag-crm">crm</label>
      <input type="checkbox" class="tag-cb" id="t-trading" value="trading"><label for="t-trading" class="tag-label tag-trading">trading</label>
      <input type="checkbox" class="tag-cb" id="t-llc" value="llc"><label for="t-llc" class="tag-label tag-llc">llc</label>
      <input type="checkbox" class="tag-cb" id="t-infra" value="infra"><label for="t-infra" class="tag-label tag-infra">infra</label>
      <input type="checkbox" class="tag-cb" id="t-request" value="request"><label for="t-request" class="tag-label tag-request">request</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDelete" style="margin-right:auto;display:none;" onclick="deleteCard()">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────
function promptForToken() {
  const t = prompt('Enter your GitHub token to enable sync:');
  if (t) localStorage.setItem('gh_token', t);
  return t || '';
}
const GITHUB_TOKEN = localStorage.getItem('gh_token') || promptForToken();
const REPO = 'harreson-bot/board';
const DATA_FILE = 'data.json';
const BRANCH = 'main';

// ── Initial data ─────────────────────────────────────────
const DEFAULT_CARDS = [
  { id: 'c1', col: 'done', title: 'GitHub Pages Board – Setup & Deploy', tags: ['infra'], note: 'Live at https://harreson-bot.github.io/board/', blocked: '', date: '2026-04-20' },
  { id: 'c2', col: 'done', title: 'Insurance CRM – Full Gmail Extraction & Rebuild', tags: ['crm', 'insurance'], note: '57 contacts extracted. Dashboard at localhost:8899/crm/index.html', blocked: '', date: '2026-04-20' },
  { id: 'c3', col: 'inprog', title: 'LLC Dissolution – Stepson\'s SC & DE LLCs', tags: ['llc'], note: 'Framework built. DE first (complex), SC in parallel.', blocked: 'Waiting on stepson\'s LLC details (names, EINs, formation dates)', date: '2026-04-20' },
  { id: 'c4', col: 'inprog', title: 'Insurance CRM – Past-Due Client Outreach', tags: ['crm', 'insurance'], note: '5 past-due clients. Call scripts + email drafts in Gmail awaiting review.', blocked: '', date: '2026-04-20' },
  { id: 'c5', col: 'inprog', title: 'Follow Up – Kent Dobey (Hot Prospect)', tags: ['insurance'], note: 'Pre-retirement ACA buyer, in pipeline since Jul 2025. Draft email in Gmail.', blocked: '', date: '2026-04-20' },
  { id: 'c6', col: 'inprog', title: 'Joseph Lombardo – Medicare Transition (Turns 65 May 2026)', tags: ['insurance'], note: 'Currently on Ambetter ACA $105.62/mo. Medicare eligible May 2026. Draft email in Gmail.', blocked: '', date: '2026-04-20' },
];

// ── State ────────────────────────────────────────────────
let cards = [];
let fileSha = null;
let dragSrcId = null;
let editingId = null;
let modalCol = null;
let saveTimer = null;

const tagClass = { crm:'tag-crm', insurance:'tag-insurance', llc:'tag-llc', infra:'tag-infra', trading:'tag-trading', request:'tag-request' };

// ── GitHub API ───────────────────────────────────────────
async function ghGet() {
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}?ref=${BRANCH}`, {
    headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (r.status === 404) return null;
  return r.json();
}

async function ghPut(content, sha) {
  const body = { message: 'Board update', content: btoa(unescape(encodeURIComponent(content))), branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`, {
    method: 'PUT',
    headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.json();
}

// ── Load ─────────────────────────────────────────────────
async function loadData() {
  setStatus('saving', '● loading…');
  try {
    const f = await ghGet();
    if (f && f.content) {
      fileSha = f.sha;
      cards = JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,'')))));
    } else {
      cards = DEFAULT_CARDS;
      await saveNow();
      return;
    }
    render();
    setStatus('saved', '● synced');
  } catch(e) {
    console.error(e);
    cards = DEFAULT_CARDS;
    render();
    setStatus('error', '● offline');
  }
}

// ── Save ─────────────────────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  setStatus('saving', '● saving…');
  saveTimer = setTimeout(saveNow, 1200);
}

async function saveNow() {
  try {
    const res = await ghPut(JSON.stringify(cards, null, 2), fileSha);
    if (res.content) { fileSha = res.content.sha; setStatus('saved', '● synced'); }
    else { setStatus('error', '● save failed'); }
  } catch(e) { setStatus('error', '● offline'); }
}

function setStatus(cls, txt) {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status ' + cls;
  el.textContent = txt;
}

// ── Render ───────────────────────────────────────────────
const COLS = ['request','todo','inprog','pending','done'];

function render() {
  COLS.forEach(col => {
    const el = document.getElementById('col-' + col);
    el.innerHTML = '';
    const colCards = cards.filter(c => c.col === col);
    if (!colCards.length) el.innerHTML = '<div class="empty">Drop cards here</div>';
    colCards.forEach(c => el.appendChild(makeCard(c)));
    // update count
    el.closest('.column').querySelector('.count').textContent = colCards.length;
  });
  initDrag();
}

function makeCard(c) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.id = c.id;
  div.innerHTML = `
    <div class="card-actions">
      <button class="btn-icon" title="Edit" onclick="openModal('${c.col}','${c.id}')">✏️</button>
      <button class="btn-icon del" title="Delete" onclick="confirmDelete('${c.id}')">🗑</button>
    </div>
    <div class="card-title">${esc(c.title)}</div>
    ${c.tags && c.tags.length ? '<div class="card-tags">' + c.tags.map(t=>`<span class="card-tag ${tagClass[t]||''}">${t}</span>`).join('') + '</div>' : ''}
    ${c.blocked ? `<div class="blocked-badge">⛔ ${esc(c.blocked)}</div>` : ''}
    ${c.note ? `<div class="card-note">${esc(c.note)}</div>` : ''}
    <div class="card-meta">${c.date || ''}</div>
  `;
  return div;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Drag & Drop ──────────────────────────────────────────
function initDrag() {
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrcId = card.dataset.id;
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });

  document.querySelectorAll('.cards').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); e.dataTransfer.dropEffect = 'move'; });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const targetCol = zone.id.replace('col-','');
      const card = cards.find(c => c.id === dragSrcId);
      if (card && card.col !== targetCol) {
        card.col = targetCol;
        render();
        scheduleSave();
      }
    });
  });
}

// ── Modal ────────────────────────────────────────────────
function openModal(col, id) {
  editingId = id || null;
  modalCol = col;
  document.getElementById('modalTitle').textContent = id ? 'Edit Card' : 'Add Card';
  document.getElementById('btnDelete').style.display = id ? 'block' : 'none';

  const c = id ? cards.find(x => x.id === id) : null;
  document.getElementById('mTitle').value = c ? c.title : '';
  document.getElementById('mNote').value = c ? (c.note || '') : '';
  document.getElementById('mBlocked').value = c ? (c.blocked || '') : '';

  document.querySelectorAll('.tag-cb').forEach(cb => {
    cb.checked = c && c.tags ? c.tags.includes(cb.value) : false;
  });

  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('mTitle').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveCard() {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) { document.getElementById('mTitle').focus(); return; }
  const tags = [...document.querySelectorAll('.tag-cb:checked')].map(cb => cb.value);
  const note = document.getElementById('mNote').value.trim();
  const blocked = document.getElementById('mBlocked').value.trim();
  const today = new Date().toISOString().split('T')[0];

  if (editingId) {
    const c = cards.find(x => x.id === editingId);
    Object.assign(c, { title, tags, note, blocked });
  } else {
    cards.push({ id: 'c' + Date.now(), col: modalCol, title, tags, note, blocked, date: today });
  }
  closeModal();
  render();
  scheduleSave();
}

function confirmDelete(id) {
  if (confirm('Delete this card?')) { deleteCardById(id); }
}

function deleteCard() {
  if (editingId && confirm('Delete this card?')) {
    deleteCardById(editingId);
    closeModal();
  }
}

function deleteCardById(id) {
  cards = cards.filter(c => c.id !== id);
  render();
  scheduleSave();
}

// ── Keyboard ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.metaKey) saveCard();
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function resetToken() {
  localStorage.removeItem('gh_token');
  location.reload();
}

// ── Boot ─────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
